name: "Deploy"
description: "Stop existing service and start python-greetings with PM2"

inputs:
  env-name:
    description: "Environment name (dev, stg, preprod, prod)"
    required: true
  port:
    description: "Port number for the service"
    required: true

runs:
  using: "composite"
  steps:
    - name: Print info
      shell: cmd
      run: echo Deploying to ${{ inputs.env-name }} environment on port ${{ inputs.port }}...

    - name: Clone python-greetings
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: python-greetings

    - name: Copy app to persistent location
      shell: cmd
      run: |
        if not exist C:\app\${{ inputs.env-name }} mkdir C:\app\${{ inputs.env-name }}
        xcopy /E /Y /I python-greetings C:\app\${{ inputs.env-name }}

    - name: Create venv and install deps
      shell: cmd
      working-directory: C:\app\${{ inputs.env-name }}
      run: |
        python -m venv venv
        venv\Scripts\python -m pip install -r requirements.txt

    - name: Resurrect previous PM2 processes
      shell: cmd
      run: pm2 resurrect & set "errorlevel=0"

    - name: Stop existing service for this env
      shell: cmd
      run: pm2 delete greetings-app-${{ inputs.env-name }} & set "errorlevel=0"

    - name: Start service
      shell: cmd
      working-directory: C:\app\${{ inputs.env-name }}
      run: pm2 start app.py --name greetings-app-${{ inputs.env-name }} --interpreter venv\Scripts\python -- --port ${{ inputs.port }}

    - name: Wait for service to start
      shell: cmd
      run: ping -n 8 127.0.0.1 >nul

    - name: Save all PM2 processes
      shell: cmd
      run: pm2 save

    - name: Verify service is running
      shell: cmd
      run: pm2 list
